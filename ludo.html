<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ludo</title>
    <link rel="stylesheet" href="ludo.css">
</head>
<body>

    <div class="app-container">
        
        <div id="main-menu-screen" class="screen active">
            <div class="menu-header">
                <button class="icon-btn" onclick="toggleModal('profile-modal')">👤</button>
                <button class="icon-btn" onclick="toggleModal('settings-modal')">⚙️</button>
            </div>
            <div class="menu-content">
                <div class="menu-title">Ludo</div>
                
                <div class="mode-card" onclick="startGame('2player')">
                    <div class="mode-icon">👥</div>
                    <div class="mode-title">2 Players Mode</div>
                </div>
                
                <div class="mode-card" onclick="startGame('computer')">
                    <div class="mode-icon">💻</div>
                    <div class="mode-title">Vs Computer</div>
                </div>
                <div> <button onclick="window.location.href='index.html'" class="secondary-btn" style="background-color: #e74c3c; margin-top: 10px;">Exit to Main App</button>
</div>
            </div>
        </div>

        <div id="game-screen" class="screen">
            <div class="game-header">
                <button class="back-btn" onclick="exitGame()">⬅️ Main Menu</button>
            </div>
            
            <div class="game-layout">
                
                <div id="player2-panel" class="control-panel">
                    <span id="p2-label" class="label-text">Player 2</span>
                    <div class="dice-wrapper">
                        <div id="p2-dice" class="dice-box">-</div>
                        <button id="p2-btn" class="roll-btn" onclick="handleRoll(2)" style="display:none;">Roll</button>
                    </div>
                </div>

                <div class="ludo-board" id="board-grid">
                    </div>

                <div id="player1-panel" class="control-panel active-turn">
                    <span id="p1-label" class="label-text">Player 1</span>
                    <div class="dice-wrapper">
                        <div id="p1-dice" class="dice-box">-</div>
                        <button id="p1-btn" class="roll-btn" onclick="handleRoll(1)">Roll</button>
                    </div>
                </div>

            </div>
        </div>

        <div id="profile-modal" class="modal-overlay">
            <div class="modal-content">
                <button class="close-modal" onclick="toggleModal('profile-modal')">✖</button>
                <div class="profile-avatar" id="avatar-preview">👤</div>
                <input type="file" id="image-input" accept="image/*" style="display: none;">
                <button class="upload-btn" onclick="document.getElementById('image-input').click()">Upload Photo</button>
                
                <input type="text" id="username-input" class="input-field" placeholder="Enter Name">
                <button class="primary-btn" onclick="saveProfileData()">Save Information</button>
            </div>
        </div>

                       <div id="settings-modal" class="modal-overlay">
            <div class="modal-content">
                <button class="close-modal" onclick="toggleModal('settings-modal')">✖</button>
                <h3 style="margin-bottom: 25px;">Settings</h3>
                
                <div class="setting-row">
                    <span class="setting-label">Sound</span>
                    <label class="toggle-switch">
                        <input type="checkbox" id="sound-toggle" checked>
                        <span class="slider"></span>
                    </label>
                </div>

                <div class="setting-row">
                    <span class="setting-label">Volume</span>
                    <input type="range" id="volume-slider" class="range-slider" min="0" max="100" value="70">
                </div>

                <div class="setting-row">
                    <span class="setting-label">Language</span>
                    <button class="select-btn">EN 🌐</button>
                </div>
            </div>
        </div>



    </div>

    <script src="ludo.js"></script>
</body>
</html>
