<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Tic Tac Toe</title>
    <link rel="stylesheet" href="tictactoe.css">
</head>
<body>
    <div class="container">
        <div id="setupScreen" class="setup-box">
            <h1>Tic Tac Toe</h1>
            <button id="openSettingsBtn" class="settings-btn">⚙️ Settings</button>
            <input type="text" id="p1Name" placeholder="Player 1 Name (X)" value="Player 1">
            <input type="text" id="p2Name" placeholder="Player 2 Name (O)" value="Player 2">
            <div class="checkbox-container">
                <input type="checkbox" id="vsComputer">
                <label for="vsComputer">Play against Computer</label>
            </div>
            <button id="startBtn" class="primary-btn">Start Game</button>
            <button onclick="window.location.href='index.html'" class="secondary-btn" style="background-color: #e74c3c; margin-top: 10px;">Exit to Main App</button>

        </div>

        <div id="gameScreen" style="display: none;">
            <h1>Tic Tac Toe</h1>
            <div class="scoreboard">
                <div class="score-box"><span id="name1Display">Player 1</span> (X): <span id="score1">0</span></div>
                <div class="score-box"><span id="name2Display">Player 2</span> (O): <span id="score2">0</span></div>
            </div>
            <h2 id="status">Player's turn</h2>
            <div id="board" class="board">
                <div class="cell" data-index="0"></div><div class="cell" data-index="1"></div><div class="cell" data-index="2"></div>
                <div class="cell" data-index="3"></div><div class="cell" data-index="4"></div><div class="cell" data-index="5"></div>
                <div class="cell" data-index="6"></div><div class="cell" data-index="7"></div><div class="cell" data-index="8"></div>
            </div>
            <button id="resetBtn" class="primary-btn">Play Next Round</button>
            <button id="backBtn" class="secondary-btn">Back to Menu</button>
        </div>
    </div>

    <!-- Settings Modal -->
    <div id="settingsModal" class="modal">
        <div class="modal-content">
            <h2>Settings</h2>
            <div class="setting-item">
                <label for="volumeSlider">Volume:</label>
                <input type="range" id="volumeSlider" min="0" max="1" step="0.1" value="0.5">
                <span id="volumeValue">50%</span>
            </div>
            <button id="closeSettingsBtn" class="primary-btn">Close</button>
        </div>
    </div>
    <script src="tictactoe.js"></script>
</body>
</html>
